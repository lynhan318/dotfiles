######################
### WINDOW RULES   ###
######################

# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*

# XWayland video bridge fixes
windowrule = opacity 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = no_anim true, match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus true, match:class ^(xwaylandvideobridge)$
windowrule = max_size 1 1, match:class ^(xwaylandvideobridge)$
windowrule = no_blur true, match:class ^(xwaylandvideobridge)$
windowrule = no_focus true, match:class ^(xwaylandvideobridge)$
windowrule = no_focus true, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false


# ---- Floating Windows ---- #

# System utilities
windowrule = float true, match:class ^(org.gnome.Calculator)$
windowrule = float true, match:class ^(blueman-manager)$
windowrule = float true, match:class ^(nm-applet)$
windowrule = float true, match:class ^(nm-connection-editor)$
windowrule = float true, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float true, match:class ^(org.kde.polkit-kde-authentication-agent-1)$

# File managers
windowrule = float true, match:class ^(org.gnome.Nautilus)$
windowrule = float true, match:class ^(org.kde.dolphin)$
windowrule = float true, match:class ^(thunar)$
windowrule = float true, match:class ^(org.kde.dolphin)$, match:title ^(Progress Dialog — Dolphin)$
windowrule = float true, match:class ^(org.kde.dolphin)$, match:title ^(Copying — Dolphin)$

# Apps
windowrule = float true, match:class ^(1Password)$
windowrule = float true, match:class ^(steam)$
windowrule = float true, match:class ^(org.telegram.desktop)$
windowrule = float true, match:class ^(org.telegram.desktop._62ab0c6e4e5c6edd16352936a1c0fd12)$
windowrule = float true, match:class ^(Slack)$
windowrule = float true, match:class ^(vesktop)$
windowrule = float true, match:class ^(Signal)$
windowrule = float true, match:class ^(vlc)$

# Android emulator
windowrule = float true, match:class ^(Emulator)$
windowrule = size 1580 2524, match:class ^(Emulator)$

# Pinentry (GPG)
windowrule = float true, match:class ^(Pinentry)$

# Firefox
windowrule = float true, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float true, match:class ^(firefox)$, match:title ^(Library)$
windowrule = float true, match:title ^(About Mozilla Firefox)$

# Chrome sign-in popups
windowrule = float true, match:class ^(google-chrome)$, match:title ^(Sign in - Google Accounts)$

# Zoom
windowrule = float true, match:class ^(Zoom)$

# Misc GUI apps
windowrule = float true, match:class ^(kvantummanager)$
windowrule = float true, match:class ^(qt5ct)$
windowrule = float true, match:class ^(qt6ct)$
windowrule = float true, match:class ^(nwg-look)$
windowrule = float true, match:class ^(org.kde.ark)$
windowrule = float true, match:class ^(com.github.rafostar.Clapper)$
windowrule = float true, match:class ^(app.drey.Warp)$
windowrule = float true, match:class ^(net.davidotek.pupgui2)$
windowrule = float true, match:class ^(yad)$
windowrule = float true, match:class ^(eog)$
windowrule = float true, match:class ^(io.github.alainm23.planify)$
windowrule = float true, match:class ^(io.gitlab.theevilskeleton.Upscaler)$
windowrule = float true, match:class ^(com.github.unrud.VideoDownloader)$
windowrule = float true, match:class ^(io.gitlab.adhami3310.Impression)$
windowrule = float true, match:class ^(io.missioncenter.MissionCenter)$
windowrule = float true, match:class ^(virt-manager)$
windowrule = size 2560 1440, match:class ^(virt-manager)$

# Common modal dialogs
windowrule = float true, match:title ^(Open Files)$
windowrule = float true, match:title ^(Choose Files)$
windowrule = float true, match:title ^(Save As)$
windowrule = float true, match:title ^(Save File)$
windowrule = float true, match:title ^(Confirm to replace files)$
windowrule = float true, match:title ^(File Operation Progress)$
windowrule = float true, match:class ^(xdg-desktop-portal-gtk)$


# ---- GNOME Apps ---- #

windowrule = rounding 0, match:class ^(org\.gnome\.)




# ---- Kitty ---- #

# windowrule = blur true, match:class ^(kitty)$


# ---- Workspace Assignments ---- #

# Messaging apps -> workspace 3 (message)
windowrule = workspace 3, match:class ^(org.telegram.desktop)$
windowrule = workspace 3, match:class ^(org.telegram.desktop._62ab0c6e4e5c6edd16352936a1c0fd12)$
windowrule = workspace 3, match:class ^(Slack)$
windowrule = workspace 3, match:class ^(vesktop)$
windowrule = workspace 3, match:class ^(discord|Discord|WebCord)$

# Chrome: full opacity
windowrule = opacity 1.0 override 1.0 override, match:class ^(google-chrome)$


# ---- Security ---- #

# Block 1Password from screencasts
windowrule = no_anim true, match:class ^(1Password)$

# DMS (Quickshell) windows float by default
windowrule = float true, match:class ^(org\.quickshell)$


######################
### LAYER RULES    ###
######################

# DMS shell layers
layerrule = blur true, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell
layerrule = blur true, match:namespace dms
layerrule = ignore_alpha 0, match:namespace dms

# DMS wallpaper blur layer
layerrule = blur true, match:namespace dms:blurwallpaper
layerrule = ignore_alpha 0, match:namespace dms:blurwallpaper

# Notification layers
layerrule = blur true, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications

# Logout dialog
layerrule = blur true, match:namespace logout_dialog
