exec-once = wl-clipboard-history -t
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wlsunset -S 9:00 -s 19:30
exec = swaybg -m fill -i ~/Downloads/clay-banks-hwLAI5lRhdM-unsplash.jpg
exec-once = waybar
exec-once = libinput-gestures-setup autostart start
exec-once = fcitx5
exec-once = nm-applet


monitor=eDP-1,highres,0x1440, 2
monitor=DP-3,2560x1440,0x0, 1 #top of eDP-1

env = XCURSOR_SIZE,24

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    col.group_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.group_border_active = rgba(595959aa)
    layout = dwindle
}

decoration {
  # в–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–Ҳ
  # в–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғ вҖғв–Ҳв–„в–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„
  rounding = 8
  multisample_edges = true

  # в–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–ҲвҖғв–Җв–Ҳв–ҖвҖғв–Ҳв–„в–Ҳ
  # в–Ҳв–„в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–‘в–Ҳв–‘вҖғв–‘в–Ҳв–‘
  active_opacity = 1.0
  inactive_opacity = 1.0

  # в–Ҳв–„в–„вҖғв–Ҳв–‘в–‘вҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–Җв–Ҳ
  # в–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–„
#  blur = true
#  blur_size = 5
#  blur_passes = 1
#  blur_new_optimizations = true


  # в–Ҳв–ҖвҖғв–Ҳв–‘в–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Ҳв–‘в–Ҳ
  # в–„в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–Җ
  drop_shadow = true
  shadow_ignore_window = true
  shadow_offset = 2 2
  shadow_range = 4
  shadow_render_power = 2
  col.shadow = 0x66000000

  blurls = gtk-layer-shell
  # blurls = waybar
  blurls = lockscreen
}

animations {
  enabled = false
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1

  animation = windows, 1, 5, overshot, slide
  animation = windowsOut, 1, 4, smoothOut, slide
  animation = windowsMove, 1, 4, default
  animation = border, 1, 10, default
  animation = fade, 1, 10, smoothIn
  animation = fadeDim, 1, 10, smoothIn
  animation = workspaces, 1, 6, default
}

dwindle {
  no_gaps_when_only = false
  pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

# в–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Ҳв–‘в–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–‘в–‘вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

windowrule = float, file_progress
windowrule = float, confirm
windowrule = float, dialog
windowrule = float, download
windowrule = float, notification
windowrule = float, error
windowrule = float, splash
windowrule = float, confirmreset
windowrule = float, title:Open File
windowrule = float, title:branchdialog
windowrule = float, Lxappearance
windowrule = float, Rofi
windowrule = animation none,Rofi
windowrule = float,viewnior
windowrule = float,feh
windowrule = float, pavucontrol-qt
windowrule = float, pavucontrol
windowrule = float, file-roller
windowrule = fullscreen, wlogout
windowrule = float, title:wlogout
windowrule = fullscreen, title:wlogout
windowrule = idleinhibit focus, mpv
windowrule = idleinhibit fullscreen, firefox
windowrule = float, title:^(Media viewer)$
windowrule = float, title:^(Volume Control)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = size 800 600, title:^(Volume Control)$
windowrule = move 75 44%, title:^(Volume Control)$
windowrulev2 = float,class:^(float)$

$primary = eDP-1
$secondary = DP-3

# MONITOR
workspace = 1, monitor:$primary
workspace = 2, monitor:$primary
workspace = 3, monitor:$primary
workspace = 4, monitor:$primary
workspace = 5, monitor:$secondary

bind = SUPER, P, exec, wlogout

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

windowrulev2 = opacity 0.95 0.90,class:^(alacritty)$
windowrule = opacity 0.95 0.90,class:^(alacritty)$

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = ALT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, return, exec, alacritty
bind = $mainMod SHIFT, return, exec, alacritty --class float
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, B, exec, firefox
bind = $mainMod, V, togglefloating, 
bind = $mainMod, D, exec, killall rofi || $HOME/.config/rofi/launchers/type-4/launcher.sh
bind = $mainMod, P, exec, hyprpicker -a -n
#bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, l, movefocus, r
bind = $mainMod, h, movefocus, l
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
$focusMonitor = hyprctl dispatch focusmonitor 
$moveToWorkspace = hyprctl dispatch movetoworkspace
$focusWorkspace = hyprctl dispatch workspace
bind = $mainMod, 1, exec, $focusMonitor $primary && $focusWorkspace 1
bind = $mainMod, 2, exec, $focusMonitor $primary && $focusWorkspace 2
bind = $mainMod, 3, exec, $focusMonitor $primary && $focusWorkspace 3
bind = $mainMod, 4, exec, $focusMonitor $primary && $focusWorkspace 4
bind = $mainMod, 5, exec, $focusMonitor $secondary && $focusWorkspace 5

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace,1
bind = $mainMod SHIFT, 2, movetoworkspace,2
bind = $mainMod SHIFT, 3, movetoworkspace,3
bind = $mainMod SHIFT, 4, movetoworkspace,4
bind = $mainMod SHIFT, 5, movecurrentworkspacetomonitor,5

# more window

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod, W, fullscreen, 1 # keep gaps and bar

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# BIND FN FEATURES

binde =, XF86MonBrightnessUp, exec, /usr/share/sway/scripts/brightness.sh up
binde =, XF86MonBrightnessDown, exec, /usr/share/sway/scripts/brightness.sh down
binde=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde=, XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=, XF86AudioPlay, exec, playerctl play-pause
bind=, XF86AudioPause, exec, playerctl play-pause
bind=, XF86AudioNext, exec, playerctl next
bind=, XF86AudioPrev, exec, playerctl previous

# в–Ҳв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–ҖвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Җв–Ҳв–Җ
# в–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–‘в–Җв–ҲвҖғв–„в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘
$screenshotarea = hyprctl keyword animation "fadeOut,0,0,default"; grimblast --notify copysave area; hyprctl keyword animation "fadeOut,1,4,default"
bind = $mainMod SHIFT, S, exec, $screenshotarea
bind = $mainMod, Print, exec, grimblast --notify --cursor copysave screen
binde = , Print, exec, grimblast --notify --cursor copysave output

# RESIZE

bind = $mainMod , left, resizeactive, -40 0
bind = $mainMod , right, resizeactive, 40 0
bind = $mainMod , up, resizeactive, 0 -40
bind = $mainMod , down, resizeactive, 0 40

#TAB

bind= $mainMod, g, togglegroup
bind= $mainMod, tab, changegroupactive

